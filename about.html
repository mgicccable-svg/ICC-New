<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC Cable Corp. - About</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }

        .logo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 1000;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #00d2ff;
        }


        .image-header {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-header video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: -1;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .header-content {
            position: relative;
            z-index: 1;
            padding: 0 20px;
            max-width: 90%;
            text-align: center;
        }

        .header-content h1 {
            font-size: 5rem;
            max-width: 80%;
            font-weight: 800;
            justify-content: center;
            margin: 0 auto;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.2;
            text-shadow: 2px 2px 12px rgba(0, 0, 0, 0.8);
        }


        h2 {
            font-size: 3rem;
            color: white;
            font-weight: 600;
            margin: 0 auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.2;
            text-shadow: 2px 2px 12px rgba(0, 0, 0, 0.8);
        }

        .main-content {
            background-color: #000000;
            padding: 60px 20px 90px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="logo-stacked.png" width="90px" alt="MyLogo">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <header class="image-header">
        <div class="image-overlay">

            <img src="dimensions changed building.jpg" alt="About ICC Cable Corp.">

            <div class="header-content">
                <h1>About</h1>
            </div>
        </div>
    </header>
</body>
